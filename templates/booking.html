<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अक्षर पाऊल | Meeting Scheduler</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Your original brand colors */
            --primary-blue: #1E73BE;
            --primary-purple: #6A1B9A;
            --accent-pink: #E91E63;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans Devanagari', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Restoring your original gradient */
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-purple));
            overflow: hidden;
            padding: 20px;
        }

        /* --- Floating Animation Elements --- */
        .circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .circles li {
            position: absolute;
            display: block;
            list-style: none;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.15);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        /* Customizing bubble positions and sizes */
        .circles li:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2){ left: 10%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3){ left: 70%; width: 25px; height: 25px; animation-delay: 4s; }
        .circles li:nth-child(4){ left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5){ left: 85%; width: 110px; height: 110px; animation-delay: 0s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 20%; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* --- The Glass Card --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 28px;
            padding: 45px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            position: relative;
            z-index: 2; /* Sits above bubbles */
        }

        .logo-wrapper {
            background: white;
            display: inline-block;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }

        .ngo-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--primary-purple);
            margin-bottom: 2px;
        }

        .motto {
            color: var(--accent-pink);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 35px;
            font-style: italic;
        }

        /* --- Modern Inputs --- */
        .form-group-custom {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group-custom label {
            font-size: 13px;
            font-weight: 700;
            color: #555;
            margin-bottom: 6px;
            display: block;
            padding-left: 4px;
        }

        .form-control-custom {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            background: #f8fafc;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(30, 115, 190, 0.1);
        }

        /* --- The "Confirm" Button --- */
        .btn-confirm {
            background: linear-gradient(to right, var(--primary-blue), var(--primary-purple));
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 15px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(106, 27, 154, 0.2);
        }

        .btn-confirm:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(106, 27, 154, 0.3);
            filter: brightness(1.1);
        }

        footer {
            position: absolute;
            bottom: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            z-index: 2;
        }
    </style>
</head>
<body>

<ul class="circles">
    <li></li><li></li><li></li><li></li><li></li><li></li>
</ul>

<div class="glass-card">
    <div class="logo-wrapper">
        <img src="{{ url_for('static', filename='logo.png') }}" width="75" alt="Akshar Paaul Logo">
    </div>

    <div class="ngo-title">अक्षर पाऊल</div>
    <div class="motto">संस्कारातून साक्षरतेकडे…</div>

    <form method="POST" action="/book">
        <div class="form-group-custom">
            <label>Full Name</label>
            <input type="text" name="name" class="form-control-custom" placeholder="Your Name" required>
        </div>

        <div class="form-group-custom">
            <label>Email Address</label>
            <input type="email" name="email" class="form-control-custom" placeholder="email@example.com" required>
        </div>

        <div class="row gx-3">
            <div class="col-6">
                <div class="form-group-custom">
                    <label>Select Date</label>
                    <input type="date" name="date" class="form-control-custom" required>
                </div>
            </div>
            <div class="col-6">
                <div class="form-group-custom">
                    <label>Select Time</label>
                    <input type="time" name="time" class="form-control-custom" required>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-confirm">
            Confirm Booking
        </button>
    </form>
</div>

<footer>
    © 2026 अक्षर पाऊल | संस्कारातून साक्षरतेकडे…
</footer>

</body>
</html>
